<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Projects</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <style>
        body {
            background-color: #f8f9fa;
        }

        .sort-btn {
            background: none;
            border: none;
            padding: 0 0 0 6px;
            color: #6c757d;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .sort-btn:hover {
            color: #0d6efd;
        }

        .sort-btn.active {
            color: #0d6efd;
        }

        .table thead th {
            white-space: nowrap;
            vertical-align: middle;
        }

        @media (max-width: 767px) {
            .table-responsive {
                font-size: 0.85rem;
            }

            .hide-mobile {
                display: none;
            }
        }
    </style>
</head>

<body>

    <div class="container-fluid py-4">

        <div
            class="d-flex flex-column flex-sm-row align-items-start align-items-sm-center justify-content-between mb-4 gap-3">
            <div>
                <h1 class="h4 mb-0 fw-semibold">Projects</h1>
                <p class="text-muted small mb-0">Manage and track all your projects</p>
            </div>
            <button class="btn btn-primary d-flex align-items-center gap-2" id="btn-new-project">
                <i class="bi bi-plus-lg"></i>
                New Project
            </button>
        </div>

        <div class="card border-0 shadow-sm">
            <div class="card-header bg-white border-bottom py-3">
                <div class="row g-2 align-items-center">
                    <div class="col-12 col-md-5">
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0">
                                <i class="bi bi-search text-muted"></i>
                            </span>
                            <input type="text" id="search-input" class="form-control border-start-0 ps-0"
                                placeholder="Search projects...">
                        </div>
                    </div>
                    <div class="col-12 col-md-3 ms-auto text-md-end">
                        <span class="text-muted small">Showing <strong id="project-count">0</strong> projects</span>
                    </div>
                </div>
            </div>

            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th scope="col" data-col="code">
                                Code
                                <button class="sort-btn" aria-label="Sort by Code">
                                    <i class="bi bi-arrow-down-up"></i>
                                </button>
                            </th>
                            <th scope="col" data-col="name">
                                Name
                                <button class="sort-btn" aria-label="Sort by Name">
                                    <i class="bi bi-arrow-down-up"></i>
                                </button>
                            </th>
                            <th scope="col" class="hide-mobile">Description</th>
                            <th scope="col" data-col="createdAt" class="hide-mobile">
                                Created
                                <button class="sort-btn" aria-label="Sort by Created date">
                                    <i class="bi bi-arrow-down-up"></i>
                                </button>
                            </th>
                            <th scope="col" data-col="updatedAt" class="hide-mobile">
                                Updated
                                <button class="sort-btn" aria-label="Sort by Updated date">
                                    <i class="bi bi-arrow-down-up"></i>
                                </button>
                            </th>
                            <th scope="col" class="text-end">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="projects-tbody">
                        <tr>
                            <td colspan="6" class="text-center text-muted py-5">Loading...</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="card-footer bg-white border-top py-3">
                <span class="text-muted small" id="footer-count">0 projects total</span>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let allProjects = [];
        let sortCol = "createdAt";
        let sortDir = "desc";

        function formatDate(iso) {
            if (!iso) return "-";
            return new Date(iso).toLocaleDateString("en-GB", {
                day: "2-digit", month: "short", year: "numeric"
            });
        }

        function renderTable(projects) {
            const tbody = document.getElementById("projects-tbody");
            document.getElementById("project-count").textContent = projects.length;
            document.getElementById("footer-count").textContent = `${projects.length} project${projects.length !== 1 ? "s" : ""} total`;

            if (projects.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="text-center text-muted py-5">No projects found.</td></tr>`;
                return;
            }

            tbody.innerHTML = projects.map(p => `
      <tr>
        <td><span class="badge bg-secondary fw-normal font-monospace">${p.code}</span></td>
        <td class="fw-medium">${p.name}</td>
        <td class="text-muted small hide-mobile">${p.description ?? ""}</td>
        <td class="text-muted small hide-mobile">${formatDate(p.createdAt)}</td>
        <td class="text-muted small hide-mobile">${formatDate(p.updatedAt)}</td>
        <td class="text-end">
          <div class="d-flex justify-content-end gap-1">
            <button class="btn btn-sm btn-outline-secondary" title="View"><i class="bi bi-eye"></i></button>
            <button class="btn btn-sm btn-outline-primary" title="Edit"><i class="bi bi-pencil"></i></button>
            <button class="btn btn-sm btn-outline-danger" title="Delete" onclick="deleteProject(${p.id})"><i class="bi bi-trash"></i></button>
          </div>
        </td>
      </tr>
    `).join("");
        }

        function applyFilters() {
            const query = document.getElementById("search-input").value.toLowerCase();

            let filtered = allProjects.filter(p =>
                p.code.toLowerCase().includes(query) ||
                p.name.toLowerCase().includes(query) ||
                (p.description ?? "").toLowerCase().includes(query)
            );

            filtered.sort((a, b) => {
                let valA = a[sortCol] ?? "";
                let valB = b[sortCol] ?? "";
                if (valA < valB) return sortDir === "asc" ? -1 : 1;
                if (valA > valB) return sortDir === "asc" ? 1 : -1;
                return 0;
            });

            renderTable(filtered);
        }

        async function loadProjects() {
            try {
                const res = await fetch("/projects");
                allProjects = await res.json();
                applyFilters();
            } catch (err) {
                document.getElementById("projects-tbody").innerHTML =
                    `<tr><td colspan="6" class="text-center text-danger py-5">Failed to load projects.</td></tr>`;
            }
        }

        async function deleteProject(id) {
            if (!confirm("Delete this project? This cannot be undone.")) return;
            await fetch(`/projects/${id}`, { method: "DELETE" });
            loadProjects();
        }

        document.querySelectorAll(".sort-btn").forEach(btn => {
            btn.addEventListener("click", function () {
                const th = this.closest("th");
                const col = th.dataset.col;
                if (sortCol === col) {
                    sortDir = sortDir === "asc" ? "desc" : "asc";
                } else {
                    sortCol = col;
                    sortDir = "asc";
                }
                document.querySelectorAll(".sort-btn").forEach(b => {
                    b.classList.remove("active");
                    b.innerHTML = '<i class="bi bi-arrow-down-up"></i>';
                });
                this.classList.add("active");
                this.innerHTML = sortDir === "asc"
                    ? '<i class="bi bi-arrow-up"></i>'
                    : '<i class="bi bi-down"></i>';
                applyFilters();
            });
        });

        document.getElementById("search-input").addEventListener("input", applyFilters);

        loadProjects();
    </script>
</body>

</html>
